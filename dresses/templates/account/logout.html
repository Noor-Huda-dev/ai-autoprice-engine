{% extends "dresses/base.html" %}
{% load i18n %}
{% load static %}

{% block title %}Sign Out - TariqWorldWide{% endblock %}

{% block content %}
<div class="container mt-5 d-flex justify-content-center align-items-center" style="min-height: 60vh;">
  <div class="card p-4 shadow border-0" style="max-width: 400px; width: 100%; border-radius: 12px;">
    <h2 class="mb-3 text-center fw-bold text-secondary">Sign Out</h2>
    <p class="mb-4 text-center text-muted fs-6">Are you sure you want to sign out?</p>
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-dark w-100 py-2 fs-5 rounded-pill shadow-sm">
        Sign Out
      </button>
    </form>
  </div>
</div>
{% endblock %}
